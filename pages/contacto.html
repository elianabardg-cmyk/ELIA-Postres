<body>
    <header>
        <a href="../index.html">
            <img src="../assets/logos/logo.png" alt="Logo de ELIA" class="logo">
        </a>
        
        <h1>ELIA</h1>
        <h2>Mas que postres creamos experiencias</h2>
        

        <nav>
            <ul>
                <li>
                    <a href="./productos.html">Productos</a>

        </nav>

    </header>

    <main>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3271.0000141969463!2d-57.9409026!3d-34.9315366!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95a2e898cf3685eb%3A0x7c15a9f42ec57979!2sParque%20Saavedra!5e0!3m2!1ses!2sar!4v1779129833899!5m2!1ses!2sar" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        
        <form action="">
            <label for="name">Nombre:</label>
            <input type="text" id="name" placeholder="John">

            <label for="surname">Apellido:</label>
            <input type="text" id="surname" placeholder="Doe">

            <label for="age">Edad:</label>
            <input type="number" id="age" placeholder="30">

            <label for="mail">e-Mail:</label>
            <input type="text" id="mail" placeholder="johndoe@gmail.com">

            <label for="pass">Contraseña:</label>
            <input type="password" id="pass">

            <label for="coments">Dejanos tus comentarios:</label>
            <textarea id="comments" placeholder="Comentarios:"></textarea>

            <input type="submit" value="Enviar">
            <input type="reset" value="Comenzar de nuevo">
            <input type="date">
        </form>
    </main>

    <footer>
        <h2>ELIA Postres Premium - Todos los derechos reservados</h2>
        <nav>
            <ul>
                <li>
                    <a href="https://www.instagram.com" target="_blank"> 
                        <img src="../assets/logos/instagram.png" alt="Logo de Instagram" class="redes">
                    </a>
                </li>
                <li>
                    <a href="https://www.facebook.com" target="_blank"> 
                        <img src="../assets/logos/facebook.png" alt="Logo de Facebook" class="redes">
                    </a>
                </li>
                <li>
                    <a href="https://web.whatsapp.com" target="_blank" class="whatsapp"> 
                        <img src="../assets/logos/whatsapp.png" alt="Logo de Whatsapp" class="redes">
